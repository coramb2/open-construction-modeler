name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Build Docker image
              run: docker build -t ocm-ci .

            - name: Run tests
              run: |
                  docker run --rm \
                      -v ${{ github.workspace }}:/app \
                      -w /app \
                      ocm-ci \
                      cargo test -p engine -p ifc -p app